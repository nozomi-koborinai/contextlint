name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run --filter '*' build

      - run: bun test

      - name: Set version and resolve workspace dependencies
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/*/; do
            (cd "$pkg" && npm pkg set "version=${VERSION}")
          done
          sed -i 's/"workspace:\*"/"'"${VERSION}"'"/g' packages/*/package.json

      - name: Publish to npm
        run: |
          for pkg in packages/*/; do
            (cd "$pkg" && bun publish --no-git-checks --access public)
          done
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
