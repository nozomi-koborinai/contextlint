name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run --filter '*' build

      - run: bun run --filter '*' typecheck

      - run: bun test

      - run: bunx eslint .

      - run: bunx markdownlint-cli2 "README*.md"
